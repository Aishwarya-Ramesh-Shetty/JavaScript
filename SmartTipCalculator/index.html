<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Welcome to Smart Tip Calculator</h1>
    <br><br>
    <label for="billAmount">Enter bill amount:</label>
    <input type="number" id="billAmount" placeholder="Enter bill amount">
    <br><br>
    <label for="tipAmount">Enter tip percentage:</label>
    <input type="number" id="tipAmount" placeholder="Enter tip percentage">
    <br><br>
    <label for="totalPeople">Enter number of people:</label>
    <input type="number" id="totalPeople" placeholder="Enter number of people">
    <br><br>
    <button id="calculateTip">Calculate</button>
    <br><br>
    <span id="displayTotal"></span>
    <br><br>
    <span id="displayPerPersonBill"></span>
    <script src="index.js"></script>
</body>
</html>
